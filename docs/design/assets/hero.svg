<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="Take@Shoot — reseau social de souvenirs photobooth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0C"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="62%">
      <stop offset="0" stop-color="#FA195E" stop-opacity="0.40"/>
      <stop offset="38%" stop-color="#FA195E" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FA195E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="42%" r="34%">
      <stop offset="0" stop-color="#FF4D86" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF4D86" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bwTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A5A5C"/>
      <stop offset="55%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#0E0E10"/>
    </linearGradient>
    <font-face font-family="ui"/>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect width="1200" height="440" fill="url(#glow)"/>
  <ellipse cx="600" cy="184" rx="300" ry="150" fill="url(#glow2)"/>

  <!-- faint tilted photobooth print, right -->
  <g transform="translate(980,86) rotate(9)" opacity="0.5">
    <rect x="0" y="0" width="190" height="250" rx="14" fill="#ECE9E6" opacity="0.10"/>
    <rect x="14" y="14" width="120" height="150" rx="6" fill="url(#bwTile)" opacity="0.55"/>
    <rect x="142" y="14" width="34" height="46" rx="4" fill="url(#bwTile)" opacity="0.45"/>
    <rect x="142" y="66" width="34" height="46" rx="4" fill="url(#bwTile)" opacity="0.45"/>
    <rect x="142" y="118" width="34" height="46" rx="4" fill="url(#bwTile)" opacity="0.45"/>
  </g>
  <!-- faint tilted photobooth print, left -->
  <g transform="translate(40,120) rotate(-8)" opacity="0.42">
    <rect x="0" y="0" width="150" height="200" rx="12" fill="#ECE9E6" opacity="0.09"/>
    <rect x="12" y="12" width="92" height="118" rx="6" fill="url(#bwTile)" opacity="0.5"/>
    <rect x="110" y="12" width="28" height="36" rx="4" fill="url(#bwTile)" opacity="0.4"/>
    <rect x="110" y="54" width="28" height="36" rx="4" fill="url(#bwTile)" opacity="0.4"/>
    <rect x="110" y="96" width="28" height="36" rx="4" fill="url(#bwTile)" opacity="0.4"/>
  </g>

  <!-- kicker -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="5" fill="#E6215A">RESEAU SOCIAL DE SOUVENIRS PHOTOBOOTH</text>

  <!-- wordmark -->
  <text x="600" y="232" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="98" font-weight="900" letter-spacing="-2" fill="#F4F2F0">Take<tspan fill="#E6215A">@</tspan>Shoot</text>
  <text x="868" y="150" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="56" font-weight="900" fill="#FA195E" transform="rotate(-10 868 150)">+</text>

  <!-- tagline -->
  <text x="600" y="296" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="500" fill="#A8A6A8">Les souvenirs disparaissent du feed, pas de ta memoire.</text>

  <!-- divider -->
  <line x1="455" y1="338" x2="745" y2="338" stroke="#2A2A2C" stroke-width="1"/>
  <circle cx="600" cy="338" r="3" fill="#FA195E"/>

  <!-- card-footer style meta -->
  <text x="600" y="382" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#6E6C70">📍 PARIS, FRANCE&#160;&#160;•&#160;&#160;14 MAI 2025&#160;&#160;•&#160;&#160;22:14</text>
</svg>
