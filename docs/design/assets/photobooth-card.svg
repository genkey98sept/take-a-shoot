<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" width="1040" height="560" role="img" aria-label="Carte photobooth Take@Shoot annotee">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0C"/><stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="cglow" cx="34%" cy="48%" r="46%">
      <stop offset="0" stop-color="#FA195E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FA195E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bw1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6B6B6E"/><stop offset="60%" stop-color="#2B2B2D"/><stop offset="100%" stop-color="#101012"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#C9C9CC" stop-opacity="0.85"/><stop offset="100%" stop-color="#C9C9CC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1040" height="560" fill="url(#cbg)"/>
  <rect width="1040" height="560" fill="url(#cglow)"/>

  <!-- THE CARD -->
  <g transform="translate(70,70)">
    <rect x="0" y="0" width="470" height="420" rx="16" fill="#ECE9E6"/>
    <!-- big photo -->
    <rect x="18" y="18" width="296" height="318" rx="8" fill="url(#bw1)"/>
    <ellipse cx="110" cy="150" rx="70" ry="80" fill="url(#face)"/>
    <ellipse cx="210" cy="135" rx="62" ry="74" fill="url(#face)"/>
    <ellipse cx="165" cy="250" rx="95" ry="70" fill="url(#face)" opacity="0.7"/>
    <!-- right column 3 photos -->
    <rect x="326" y="18" width="126" height="98" rx="6" fill="url(#bw1)"/>
    <ellipse cx="389" cy="60" rx="48" ry="40" fill="url(#face)" opacity="0.8"/>
    <rect x="326" y="128" width="126" height="98" rx="6" fill="url(#bw1)"/>
    <ellipse cx="389" cy="170" rx="48" ry="40" fill="url(#face)" opacity="0.7"/>
    <rect x="326" y="238" width="126" height="98" rx="6" fill="url(#bw1)"/>
    <ellipse cx="389" cy="280" rx="48" ry="40" fill="url(#face)" opacity="0.75"/>
    <!-- footer -->
    <text x="20" y="372" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#2A2A2A">📍 PARIS, FRANCE</text>
    <text x="20" y="398" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5" fill="#6E6C70">14 MAI 2025  •  22:14</text>
    <text x="450" y="384" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="800" fill="#E6215A">Take@Shoot</text>
    <text x="450" y="406" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="900" fill="#FA195E">+</text>
  </g>

  <!-- annotations -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <!-- cadre creme -->
    <line x1="540" y1="92" x2="610" y2="92" stroke="#E6215A" stroke-width="1.5"/>
    <circle cx="540" cy="92" r="3.5" fill="#E6215A"/>
    <text x="622" y="88" font-size="16" font-weight="700" fill="#F4F2F0">Cadre creme #ECE9E6</text>
    <text x="622" y="110" font-size="13" fill="#A8A6A8">pas de blanc pur — contraste inverse</text>

    <!-- grande + 3 -->
    <line x1="540" y1="190" x2="610" y2="190" stroke="#E6215A" stroke-width="1.5"/>
    <circle cx="540" cy="190" r="3.5" fill="#E6215A"/>
    <text x="622" y="186" font-size="16" font-weight="700" fill="#F4F2F0">1 grande photo + 3 verticales</text>
    <text x="622" y="208" font-size="13" fill="#A8A6A8">les 4 prises live du Shoot, en N&amp;B</text>

    <!-- footer meta -->
    <line x1="540" y1="300" x2="610" y2="300" stroke="#E6215A" stroke-width="1.5"/>
    <circle cx="540" cy="300" r="3.5" fill="#E6215A"/>
    <text x="622" y="296" font-size="16" font-weight="700" fill="#F4F2F0">Lieu • Date • Heure</text>
    <text x="622" y="318" font-size="13" fill="#A8A6A8">estampille en MAJUSCULES, comme un tirage</text>

    <!-- signature -->
    <line x1="540" y1="404" x2="610" y2="404" stroke="#E6215A" stroke-width="1.5"/>
    <circle cx="540" cy="404" r="3.5" fill="#E6215A"/>
    <text x="622" y="400" font-size="16" font-weight="700" fill="#F4F2F0">Signature marque + « ＋ »</text>
    <text x="622" y="422" font-size="13" fill="#A8A6A8">le « + » : splash, carte, FAB camera</text>
  </g>

  <text x="70" y="528" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-style="italic" fill="#6E6C70">PhotoboothCard — le composant central : chaque publication s'affiche ainsi.</text>
</svg>
